# Rename `app`, then:
#   fly launch --config infra/fly.toml --no-deploy
#   fly deploy --config infra/fly.toml
app = "spiritualmeet-api"
primary_region = "iad"

[build]
  dockerfile = "infra/Dockerfile"

[processes]
  app = "/api"
  worker = "/worker"

[http_service]
  processes = ["app"]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  APP_ENV = "production"
  HTTP_ADDR = ":8080"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
